<!DOCTYPE html>
<html>
<head>
    <title>Clear LocalStorage Test</title>
</head>
<body>
    <h1>Clear LocalStorage for 6v App</h1>
    <button onclick="clearPanelStates()">Clear Panel States</button>
    <button onclick="showAll()">Show All LocalStorage</button>
    <pre id="output"></pre>
    
    <script>
        function clearPanelStates() {
            // Clear all panel-collapsed keys
            const keys = Object.keys(localStorage);
            const panelKeys = keys.filter(key => key.startsWith('panel-collapsed-'));
            panelKeys.forEach(key => {
                localStorage.removeItem(key);
                console.log('Removed:', key);
            });
            document.getElementById('output').textContent = 'Cleared ' + panelKeys.length + ' panel states:\n' + panelKeys.join('\n');
        }
        
        function showAll() {
            const items = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                items[key] = localStorage.getItem(key);
            }
            document.getElementById('output').textContent = JSON.stringify(items, null, 2);
        }
        
        // Auto-show on load
        showAll();
    </script>
</body>
</html>
