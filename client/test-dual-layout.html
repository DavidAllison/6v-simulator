<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Simulation Layout Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
        }

        .app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f0f0f0;
        }

        .header {
            background: #333;
            color: white;
            padding: 10px 20px;
            flex-shrink: 0;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 1fr;
            flex: 1;
            gap: 10px;
            padding: 10px;
            min-height: 0;
            overflow: hidden;
        }

        .panel {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            overflow: auto;
        }

        .visualization-container {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .dual-simulation-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            min-height: 0;
            overflow: hidden;
        }

        .simulation-container {
            flex: 1;
            background: #e0e0e0;
            border: 1px solid #999;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .simulation-label {
            background: #666;
            color: white;
            padding: 8px;
            flex-shrink: 0;
        }

        .simulation-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            overflow: hidden;
            padding: 10px;
        }

        .canvas-placeholder {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background: linear-gradient(45deg, #ccc 25%, transparent 25%),
                        linear-gradient(-45deg, #ccc 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #ccc 75%),
                        linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 2px solid #666;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>6-Vertex Model Simulator - Layout Test</h1>
        </header>
        
        <div class="main-content">
            <div class="panel">
                <h2>Left Panel</h2>
                <p>Controls would go here</p>
            </div>
            
            <div class="visualization-container">
                <div class="dual-simulation-display">
                    <div class="simulation-container">
                        <div class="simulation-label">Simulation A</div>
                        <div class="simulation-content">
                            <div class="canvas-placeholder"></div>
                        </div>
                    </div>
                    
                    <div class="simulation-container">
                        <div class="simulation-label">Simulation B</div>
                        <div class="simulation-content">
                            <div class="canvas-placeholder"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <h2>Right Panel</h2>
                <p>Statistics would go here</p>
            </div>
        </div>
    </div>
</body>
</html>
